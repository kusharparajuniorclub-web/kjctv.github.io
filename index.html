<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KJC TV - Premium OTT</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Plyr HTML5 Player for better local MP4/MKV compatibility -->
    <link rel="stylesheet" href="https://cdn.plyr.io/3.7.8/plyr.css" />
    <style>
        :root {
            --bg-color: #090e17;
            --card-bg: #151f32;
            --accent-color: #00ffcc;
            --text-color: #ffffff;
            --text-secondary: #8a9bb4;
        }
        body { 
            background-color: var(--bg-color); 
            color: var(--text-color); 
            font-family: 'Segoe UI', Roboto, sans-serif; 
            margin: 0; 
            padding: 0;
        }
        /* Sticky Main display Player Screen */
        .player-container {
            position: sticky;
            top: 0;
            z-index: 999;
            background: #000;
            width: 100%;
            aspect-ratio: 16 / 9;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }
        .player-container video {
            width: 100%;
            height: 100%;
        }
        .app-info {
            padding: 12px 15px;
            background: linear-gradient(to bottom, #0d1726, var(--bg-color));
            border-bottom: 1px solid #1a263b;
        }
        .app-info h1 {
            margin: 0; font-size: 18px; font-weight: 700;
            background: linear-gradient(45deg, #00ffcc, #00bcff);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }
        .app-info p { margin: 3px 0 0 0; font-size: 11px; color: var(--text-secondary); }
        
        .main-scroller { padding-top: 10px; }
        .category-section { margin-bottom: 22px; padding-left: 15px; }
        .category-title {
            font-size: 15px; font-weight: 600; margin-bottom: 10px;
            display: flex; align-items: center; gap: 8px; color: #f1f5f9;
        }
        .category-title i { color: var(--accent-color); font-size: 13px; }
        
        .slider {
            display: flex; overflow-x: auto; gap: 12px;
            padding-bottom: 8px; scroll-behavior: smooth;
        }
        .slider::-webkit-scrollbar { display: none; }
        
        /* TV Card */
        .card {
            flex: 0 0 auto; width: 95px; background: var(--card-bg);
            border-radius: 12px; padding: 10px 6px; text-align: center;
            cursor: pointer; border: 1px solid #1e2d4a; transition: 0.2s;
        }
        .card:active { transform: scale(0.95); border-color: var(--accent-color); }
        .image-wrapper {
            width: 65px; height: 65px; margin: 0 auto;
            display: flex; align-items: center; justify-content: center;
            background: #ffffff; border-radius: 50%; overflow: hidden;
            border: 2px solid #283a56;
        }
        .card img { width: 75%; height: 75%; object-fit: contain; }
        .card p {
            margin: 8px 0 0 0; font-size: 11px; font-weight: 600; color: #e2e8f0;
            text-overflow: ellipsis; overflow: hidden; white-space: nowrap;
        }

        /* Movie Card */
        .poster-card {
            flex: 0 0 auto; width: 110px; background: var(--card-bg);
            border-radius: 10px; overflow: hidden; cursor: pointer;
            border: 1px solid #1e2d4a; transition: 0.2s;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }
        .poster-card:active { transform: scale(0.95); border-color: var(--accent-color); }
        .poster-thumb { width: 100%; height: 150px; object-fit: cover; }
        .poster-details { padding: 6px; text-align: left; }
        .poster-details h4 { margin: 0; font-size: 11px; color: #fff; text-overflow: ellipsis; overflow: hidden; white-space: nowrap; }
        .poster-details p { margin: 2px 0 0 0; font-size: 9px; color: var(--accent-color); }

        .loading-shimmer { padding: 30px; text-align: center; color: var(--text-secondary); }
        .loading-shimmer i { font-size: 24px; color: var(--accent-color); animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div class="player-container">
        <!-- Native HTML5 Video container for Plyr Integration -->
        <video id="player" playsinline controls poster="https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEgyniKyW9pUz1OKx5bgzLASwGVSuP0e7hX9FxVMTJMHxhu8X0tpucgSplBZgM8pCYrJJH0P2_dTC1-wzp4mMUU4sKnOzghGPCwWdbYOOa4jTyhpr7ydNj-UK-bc56IMsk2H3WZJ-SzSZIk0dTpyABCFR2_zjC2_c86W1pv7odFBT_Y-hyJs62g-3zCJkPGd/s1024/1000398131.png">
            <source id="video-source" src="" type="video/mp4">
        </video>
    </div>

    <div class="app-info">
        <h1 id="playing-title">KJC TV ওটিটি সার্ভার</h1>
        <p id="playing-cat">নিচ থেকে যেকোনো চ্যানেল বা মুভি সিলেক্ট করুন</p>
    </div>

    <div id="loading" class="loading-shimmer">
        <i class="fa-solid fa-circle-notch"></i>
        <p>সার্ভার থেকে কন্টেন্ট সাজানো হচ্ছে...</p>
    </div>

    <div class="main-scroller" id="main-content" style="display: none;">
        
        <div id="dynamic-tv-sections"></div>

        <!-- FTP Movies Category -->
        <div class="category-section">
            <div class="category-title"><i class="fa-solid fa-film"></i> হিন্দি ব্লকবাস্টার মুভি (FTP Server) 🎬</div>
            <div class="slider">
                
                <!-- Dunki -->
                <div class="poster-card" onclick="playVideo('https://server3.ftpbd.net/FTP-3/Hindi%20Movies/Dunki%20%282023%29/Dunki.2023.1080p.NF.WEB-DL.DDP5.1.Atmos.H.264-BEN THE MEN.mkv', 'Dunki (2023)', 'হিন্দি মুভি কালেকশন')">
                    <img class="poster-thumb" src="https://images.justwatch.com/poster/309324545/s332/dunki.webp" alt="Dunki">
                    <div class="poster-details">
                        <h4>Dunki (2023)</h4>
                        <p>1080p HD</p>
                    </div>
                </div>

                <!-- Animal -->
                <div class="poster-card" onclick="playVideo('https://server3.ftpbd.net/FTP-3/Hindi%20Movies/Animal%20%282023%29/Animal.2023.1080p.NF.WEB-DL.DDP5.1.Atmos.H.264-BEN%20THE%20MEN.mkv', 'Animal (2023)', 'হিন্দি মুভি কালেকশন')">
                    <img class="poster-thumb" src="https://images.justwatch.com/poster/306232230/s332/animal-2023.webp" alt="Animal">
                    <div class="poster-details">
                        <h4>Animal (2023)</h4>
                        <p>1080p HD</p>
                    </div>
                </div>

                <!-- Jawan -->
                <div class="poster-card" onclick="playVideo('https://server3.ftpbd.net/FTP-3/Hindi%20Movies/Jawan%20%282023%29/Jawan.2023.Extended.1080p.NF.WEB-DL.DDP5.1.Atmos.H.264-BEN%20THE%20MEN.mkv', 'Jawan (2023)', 'হিন্দি মুভি কালেকশন')">
                    <img class="poster-thumb" src="https://images.justwatch.com/poster/306195583/s332/jawan.webp" alt="Jawan">
                    <div class="poster-details">
                        <h4>Jawan (2023)</h4>
                        <p>Extended HD</p>
                    </div>
                </div>

            </div>
        </div>

    </div>

    <!-- Plyr & HLS Scripts for maximum format rendering -->
    <script src="https://cdn.plyr.io/3.7.8/plyr.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <script>
        const m3uUrl = 'https://raw.githubusercontent.com/kusharparajuniorclub-web/kjctv.github.io/main/playlist.m3u';
        let plyrPlayer;
        let hls;

        document.addEventListener('DOMContentLoaded', () => {
            plyrPlayer = new Plyr('#player', {
                controls: ['play-large', 'play', 'progress', 'current-time', 'mute', 'volume', 'fullscreen']
            });
            initOTT();
        });

        function playVideo(url, name, category) {
            document.getElementById('playing-title').innerText = name;
            document.getElementById('playing-cat').innerText = category;
            
            const videoElement = document.getElementById('player');
            
            // পূর্বের HLS কানেকশন রিমুভ করা
            if (hls) {
                hls.destroy();
            }

            // যদি এটি লাইভ টিভি স্ট্রিম (.m3u8) হয়
            if (url.includes('m3u8')) {
                if (Hls.isSupported()) {
                    hls = new Hls();
                    hls.loadSource(url);
                    hls.attachMedia(videoElement);
                } else if (videoElement.canPlayType('application/vnd.apple.mpegurl')) {
                    videoElement.src = url;
                }
            } else {
                // এফটিপি সার্ভারের mkv/mp4 ভিডিওর জন্য ডিরেক্ট সোর্স ইঞ্জিন
                videoElement.src = url;
            }
            
            plyrPlayer.play().catch(e => console.log("Playback error or network constraint."));
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        async function initOTT() {
            try {
                const response = await fetch(m3uUrl);
                const text = await response.text();
                document.getElementById('loading').style.display = 'none';
                document.getElementById('main-content').style.display = 'block';
                parseM3U(text);
            } catch (error) {
                document.getElementById('loading').innerHTML = '<p style="color:#ef4444;">সার্ভার কানেকশন ব্যর্থ হয়েছে!</p>';
            }
        }

        function parseM3U(data) {
            const lines = data.split('\n');
            const categories = {
                "Sports Live 🏆": [],
                "Live News 📰": [],
                "Entertainment 🎭": []
            };

            let currentName = ''; let currentLogo = ''; let currentGroup = '';

            for (let i = 0; i < lines.length; i++) {
                const line = lines[i].trim();
                if (line.startsWith('#EXTINF:')) {
                    const nameMatch = line.match(/group-title="([^"]+)"/);
                    const labelMatch = line.match(/,(.+)$/);
                    currentName = labelMatch ? labelMatch[1].trim() : 'Unknown Channel';
                    currentGroup = nameMatch ? nameMatch[1].toLowerCase() : '';
                    const logoMatch = line.match(/tvg-logo="([^"]+)"/);
                    currentLogo = logoMatch ? logoMatch[1] : '';
                } else if (line.startsWith('http')) {
                    if (currentName && !currentName.includes("Welcome") && !currentName.includes("New App")) {
                        let targetCategory = "Entertainment 🎭";
                        if (currentGroup.includes("sports") || currentGroup.includes("bdix") || currentName.toLowerCase().includes("sports") || currentName.toLowerCase().includes("cricket")) {
                            targetCategory = "Sports Live 🏆";
                        } else if (currentGroup.includes("news") || currentName.toLowerCase().includes("tv") || currentName.includes("সময়") || currentName.includes("যমুনা")) {
                            targetCategory = "Live News 📰";
                        }
                        categories[targetCategory].push({
                            name: currentName,
                            logo: currentLogo || 'https://cdn-icons-png.flaticon.com/512/716/716429.png',
                            url: line
                        });
                    }
                    currentName = ''; currentLogo = ''; currentGroup = '';
                }
            }

            const tvContainer = document.getElementById('dynamic-tv-sections');
            for (const [catName, chList] of Object.entries(categories)) {
                if (chList.length === 0) continue;

                const section = document.createElement('div');
                section.className = 'category-section';
                section.innerHTML = `<div class="category-title"><i class="fa-solid fa-circle-dot" style="color:#ef4444;"></i> ${catName}</div>`;

                const slider = document.createElement('div');
                slider.className = 'slider';

                chList.forEach(ch => {
                    const card = document.createElement('div');
                    card.className = 'card';
                    card.innerHTML = `
                        <div class="image-wrapper"><img src="${ch.logo}" onerror="this.src='https://cdn-icons-png.flaticon.com/512/716/716429.png'"></div>
                        <p>${ch.name}</p>
                    `;
                    card.onclick = () => playVideo(ch.url, ch.name, catName);
                    slider.appendChild(card);
                });

                section.appendChild(slider);
                tvContainer.appendChild(section);
            }
        }
    </script>
</body>
</html>
