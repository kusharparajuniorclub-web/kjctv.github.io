
<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KJC TV - Ultimate Dynamic OTT</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Plyr HTML5 Player Component -->
    <link rel="stylesheet" href="https://cdn.plyr.io/3.7.8/plyr.css" />
    <style>
        :root {
            --bg-color: #090e17;
            --card-bg: #151f32;
            --accent-color: #00ffcc;
            --text-color: #ffffff;
            --text-secondary: #8a9bb4;
        }
        body { 
            background-color: var(--bg-color); 
            color: var(--text-color); 
            font-family: 'Segoe UI', Roboto, sans-serif; 
            margin: 0; padding: 0;
            -webkit-user-select: none; user-select: none;
        }
        /* Sticky Top Player Screen */
        .player-container {
            position: sticky; top: 0; z-index: 999;
            background: #000; width: 100%; aspect-ratio: 16 / 9;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }
        .player-container video { width: 100%; height: 100%; }
        
        .app-info {
            padding: 12px 15px;
            background: linear-gradient(to bottom, #0d1726, var(--bg-color));
            border-bottom: 1px solid #1a263b;
        }
        .app-info h1 {
            margin: 0; font-size: 18px; font-weight: 700;
            background: linear-gradient(45deg, #00ffcc, #00bcff);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }
        .app-info p { margin: 3px 0 0 0; font-size: 11px; color: var(--text-secondary); }
        
        .main-scroller { padding-top: 10px; }
        .category-section { margin-bottom: 22px; padding-left: 15px; }
        .category-title {
            font-size: 15px; font-weight: 600; margin-bottom: 10px;
            display: flex; align-items: center; gap: 8px; color: #f1f5f9;
        }
        .category-title i { color: var(--accent-color); font-size: 13px; }
        
        /* Universal Premium Horizontal Slider */
        .slider {
            display: flex; overflow-x: auto; gap: 12px;
            padding-bottom: 8px; scroll-behavior: smooth;
        }
        .slider::-webkit-scrollbar { display: none; }
        
        /* Smart Adaptive Premium Card (Handles both Channels & Movies nicely) */
        .poster-card {
            flex: 0 0 auto; width: 115px; background: var(--card-bg);
            border-radius: 12px; overflow: hidden; cursor: pointer;
            border: 1px solid #1e2d4a; transition: 0.2s;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }
        .poster-card:active { transform: scale(0.95); border-color: var(--accent-color); }
        .poster-thumb-wrapper {
            width: 100%; height: 135px; background: #fff; 
            display: flex; align-items: center; justify-content: center; overflow: hidden;
        }
        .poster-thumb { width: 100%; height: 100%; object-fit: cover; transition: 0.2s; }
        /* Automatic logo tuning if image is square or icon */
        .poster-thumb.contain { width: 75%; height: 75%; object-fit: contain; }
        
        .poster-details { padding: 8px; text-align: left; }
        .poster-details h4 { margin: 0; font-size: 11px; color: #fff; text-overflow: ellipsis; overflow: hidden; white-space: nowrap; }
        .poster-details p { margin: 2px 0 0 0; font-size: 9px; color: var(--accent-color); }

        .loading-shimmer { padding: 50px 20px; text-align: center; color: var(--text-secondary); }
        .loading-shimmer i { font-size: 26px; color: var(--accent-color); animation: spin 1s linear infinite; margin-bottom: 10px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <!-- ওপরে ফিক্সড ওটিটি ডিসপ্লে প্লেয়ার -->
    <div class="player-container">
        <video id="player" playsinline controls poster="https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEgyniKyW9pUz1OKx5bgzLASwGVSuP0e7hX9FxVMTJMHxhu8X0tpucgSplBZgM8pCYrJJH0P2_dTC1-wzp4mMUU4sKnOzghGPCwWdbYOOa4jTyhpr7ydNj-UK-bc56IMsk2H3WZJ-SzSZIk0dTpyABCFR2_zjC2_c86W1pv7odFBT_Y-hyJs62g-3zCJkPGd/s1024/1000398131.png">
            <source id="video-source" src="" type="video/mp4">
        </video>
    </div>

    <div class="app-info">
        <h1 id="playing-title">KJC TV PREMIUM</h1>
        <p id="playing-cat">কুশারপাড়া জুনিয়র ক্লাব ওটিটি হাব</p>
    </div>

    <div id="loading" class="loading-shimmer">
        <i class="fa-solid fa-circle-notch"></i>
        <p>সার্ভার ফাইল থেকে কন্টেন্ট সাজানো হচ্ছে...</p>
    </div>

    <!-- এখানেই শতকরা সব ভিডিও ও চ্যানেল এক জায়গায় লোড হবে -->
    <div class="main-scroller" id="main-content" style="display: none;"></div>

    <!-- Plyr Core Script Engine -->
    <script src="https://cdn.plyr.io/3.7.8/plyr.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <script>
        // আপনার গিটহাবের সেই টেক্সট ফাইলটির ডিরেক্ট লিংক
        const txtUrl = 'https://raw.githubusercontent.com/kusharparajuniorclub-web/kjctv.github.io/main/content.txt';
        let plyrPlayer;
        let hls;

        document.addEventListener('DOMContentLoaded', () => {
            plyrPlayer = new Plyr('#player', {
                controls: ['play-large', 'play', 'progress', 'current-time', 'mute', 'volume', 'fullscreen']
            });
            fetchExternalContent();
        });

        function playVideo(url, name, category) {
            document.getElementById('playing-title').innerText = name;
            document.getElementById('playing-cat').innerText = category;
            const videoElement = document.getElementById('player');
            
            if (hls) { hls.destroy(); }

            if (url.includes('m3u8')) {
                if (Hls.isSupported()) {
                    hls = new Hls();
                    hls.loadSource(url);
                    hls.attachMedia(videoElement);
                } else if (videoElement.canPlayType('application/vnd.apple.mpegurl')) {
                    videoElement.src = url;
                }
            } else {
                videoElement.src = url;
            }
            
            plyrPlayer.play().catch(e => console.log("Auto-play status handled."));
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        async function fetchExternalContent() {
            try {
                const response = await fetch(txtUrl);
                const text = await response.text();
                document.getElementById('loading').style.display = 'none';
                document.getElementById('main-content').style.display = 'block';
                parseAndBuildUI(text);
            } catch (error) {
                document.getElementById('loading').innerHTML = '<p style="color:#ef4444;">কন্টেন্ট ফাইল লোড করা যায়নি!</p>';
            }
        }

        function parseAndBuildUI(data) {
            const lines = data.split('\n');
            const mainContentContainer = document.getElementById('main-content');
            
            let currentSection = null;
            let currentSlider = null;
            let currentCatName = "";

            lines.forEach(line => {
                let trimmed = line.trim();
                if (!trimmed) return;

                // নতুন ক্যাটাগরি তৈরি শনাক্তকরণ
                if (trimmed.startsWith('#CATEGORY:')) {
                    currentCatName = trimmed.replace('#CATEGORY:', '').trim();
                    
                    currentSection = document.createElement('div');
                    currentSection.className = 'category-section';
                    currentSection.innerHTML = `<div class="category-title"><i class="fa-solid fa-play"></i> ${currentCatName}</div>`;
                    
                    currentSlider = document.createElement('div');
                    currentSlider.className = 'slider';
                    
                    currentSection.appendChild(currentSlider);
                    mainContentContainer.appendChild(currentSection);
                } 
                // কন্টেন্ট ডেটা পার্সিং (নাম | লোগো | লিংক)
                else if (trimmed.includes('|') && currentSlider) {
                    const parts = trimmed.split('|');
                    const name = parts[0] ? parts[0].trim() : 'Unknown';
                    const logo = parts[1] ? parts[1].trim() : 'https://cdn-icons-png.flaticon.com/512/716/716429.png';
                    const url = parts[2] ? parts[2].trim() : '';

                    if (url) {
                        const card = document.createElement('div');
                        card.className = 'poster-card';
                        
                        // যদি লোগোটি পিএনজি বা আইকন টাইপ হয় তবে সুন্দর দেখানোর জন্য অটো ফিট ক্লাস টিউনিং
                        const isIcon = logo.includes('.png') || logo.includes('icon') || logo.includes('flaticon');
                        const thumbClass = isIcon ? 'poster-thumb contain' : 'poster-thumb';

                        card.innerHTML = `
                            <div class="poster-thumb-wrapper">
                                <img class="${thumbClass}" src="${logo}" onerror="this.src='https://cdn-icons-png.flaticon.com/512/716/716429.png'">
                            </div>
                            <div class="poster-details">
                                <h4>${name}</h4>
                                <p>OTT Stream</p>
                            </div>
                        `;
                        
                        card.onclick = () => playVideo(url, name, currentCatName);
                        currentSlider.appendChild(card);
                    }
                }
            });
        }
    </script>
</body>
</html>
