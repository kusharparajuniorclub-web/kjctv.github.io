<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KJC TV Live</title>
    <style>
        body { background-color: #0d131a; color: white; font-family: Arial, sans-serif; margin: 0; padding: 10px; }
        h2 { text-align: center; color: #3498db; font-size: 20px; margin-bottom: 20px; }
        .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; padding: 5px; }
        .card { background: #1a2332; border-radius: 12px; padding: 15px; text-align: center; cursor: pointer; border: 1px solid #24344d; transition: 0.2s; }
        .card:active { background: #24344d; }
        .card img { width: 70px; height: 70px; object-fit: contain; border-radius: 8px; background: #fff; padding: 2px; }
        .card p { margin: 10px 0 0 0; font-size: 14px; font-weight: bold; color: #f1f2f6; text-overflow: ellipsis; overflow: hidden; white-space: nowrap; }
    </style>
</head>
<body>

    <h2>📺 লাইভ টিভি চ্যানেল</h2>
    <div class="grid" id="channel-container"></div>

    <script>
        // আপনার গিটহাবের m3u ফাইলের RAW লিংক
        const m3uUrl = 'https://raw.githubusercontent.com/kusharparajuniorclub-web/kjctv.github.io/main/playlist.m3u';

        async function fetchM3U() {
            try {
                const response = await fetch(m3uUrl);
                const text = await response.text();
                parseM3U(text);
            } catch (error) {
                console.error("চ্যানেল লোড করা যায়নি:", error);
            }
        }

        function parseM3U(data) {
            const lines = data.split('\n');
            const container = document.getElementById('channel-container');
            let currentName = '';
            let currentLogo = '';

            for (let i = 0; i < lines.length; i++) {
                const line = lines[i].trim();
                
                if (line.startsWith('#EXTINF:')) {
                    // নাম খুঁজে বের করা
                    const nameMatch = line.match(/tvg-name="([^"]+)"/) || line.match(/,(.+)$/);
                    currentName = nameMatch ? nameMatch[1] : 'Unknown Channel';
                    
                    // লোগো খুঁজে বের করা
                    const logoMatch = line.match(/tvg-logo="([^"]+)"/);
                    currentLogo = logoMatch ? logoMatch[1] : 'https://cdn-icons-png.flaticon.com/512/716/716429.png';
                } else if (line.startsWith('http')) {
                    const url = line;
                    
                    if (currentName) {
                        const card = document.createElement('div');
                        card.className = 'card';
                        card.innerHTML = `
                            <img src="${currentLogo}" onerror="this.src='https://cdn-icons-png.flaticon.com/512/716/716429.png'">
                            <p>${currentName}</p>
                        `;
                        
                        // ক্লিক করলে সরাসরি অ্যান্ড্রয়েড প্লেয়ারে ভিডিও প্লে হবে
                        card.onclick = () => {
                            window.location.href = url;
                        };
                        
                        container.appendChild(card);
                    }
                    // রিসেট
                    currentName = '';
                    currentLogo = '';
                }
            }
        }

        fetchM3U();
    </script>
</body>
</html>
